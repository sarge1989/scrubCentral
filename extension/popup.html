<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7fafa;
      color: #1a2e35;
    }

    .header {
      background: #00838f;
      color: white;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg { flex-shrink: 0; }
    .header .title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .header .subtitle { font-size: 11px; opacity: 0.55; margin-left: 4px; }

    .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #1a2e35;
      margin-bottom: 5px;
    }

    .label-hint { font-weight: 400; color: #8ca0a8; margin-left: 4px; }

    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid #d1dde2;
      border-radius: 8px;
      overflow: hidden;
    }

    .mode-btn {
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .mode-btn:first-child { border-right: 1px solid #d1dde2; }
    .mode-btn.active { background: #00838f; color: white; }
    .mode-btn:not(.active) { background: white; color: #5a7a84; }
    .mode-btn:not(.active):hover { background: #e0f2f1; }

    select, textarea {
      width: 100%;
      border: 1px solid #d1dde2;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      color: #1a2e35;
      background: white;
      transition: border-color 0.15s;
    }

    select:focus, textarea:focus {
      outline: none;
      border-color: #00838f;
      box-shadow: 0 0 0 2px rgba(0, 131, 143, 0.12);
    }

    textarea { resize: none; }

    .reading-level { transition: opacity 0.2s; }
    .reading-level.disabled { opacity: 0.3; pointer-events: none; }

    .transform-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: #00838f;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .transform-btn:hover:not(:disabled) { background: #006064; }
    .transform-btn:disabled { background: rgba(0, 131, 143, 0.5); cursor: wait; }

    .error {
      background: #fff0f0;
      border: 1px solid rgba(211, 47, 47, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #d32f2f;
    }

    .url-info {
      font-size: 11px;
      color: #8ca0a8;
      padding: 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .url-info.not-cpf { color: #d32f2f; font-weight: 600; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 16px;
      height: 16px;
      animation: spin 0.8s linear infinite;
    }

    /* Success state */
    .success-view { display: none; }
    .success-view.visible { display: flex; }

    .success-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #e0f2f1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 4px;
    }

    .success-msg {
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      color: #1a2e35;
    }

    .success-sub {
      font-size: 12px;
      color: #8ca0a8;
      text-align: center;
    }

    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 2px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      border: 1px solid #d1dde2;
      background: white;
      color: #1a2e35;
    }

    .action-btn:hover { background: #f0f7f8; border-color: #00838f; }

    .action-btn.undo { color: #5a7a84; }
    .action-btn.undo:hover { color: #1a2e35; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="white" fill-opacity="0.15"/>
      <path d="M7 14h14M14 7v14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="title">ScrubCentral</span>
    <span class="subtitle">Page Transform</span>
  </div>

  <!-- Form view -->
  <div class="body" id="formView">
    <div class="url-info" id="urlInfo">Checking current page...</div>

    <div>
      <label>Transform Mode</label>
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeSimple" type="button">Simple English</button>
        <button class="mode-btn" id="modeLlm" type="button">LLM-Optimized</button>
      </div>
    </div>

    <div class="reading-level" id="readingLevelGroup">
      <label for="readingLevel">Reading Level</label>
      <select id="readingLevel">
        <option value="primary">Primary (Age 7-12)</option>
        <option value="secondary" selected>Secondary (Age 13-16)</option>
        <option value="adult">Adult (General)</option>
      </select>
    </div>

    <div>
      <label for="customInstruction">Custom Instruction <span class="label-hint">(optional)</span></label>
      <textarea id="customInstruction" rows="2" placeholder='e.g. "focus on retirement benefits"'></textarea>
    </div>

    <div id="errorContainer" style="display:none">
      <div class="error" id="errorMessage"></div>
    </div>

    <button class="transform-btn" id="transformBtn" type="button">
      <span id="btnText">Transform this page</span>
    </button>
  </div>

  <!-- Success view -->
  <div class="body success-view" id="successView">
    <div class="success-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="#00838f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="success-msg">Page transformed</div>
    <div class="success-sub" id="successSub">42 text blocks rewritten</div>
    <div class="success-actions">
      <button class="action-btn" id="viewDiffBtn" type="button">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M5 3v10M11 3v10M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        View changes in new tab
      </button>
      <button class="action-btn undo" id="undoBtn" type="button">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M3 7h7a3 3 0 010 6H8M3 7l3-3M3 7l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Undo — restore original
      </button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
